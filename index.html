<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAYWAY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0D0D0D;
    color: #F5F5F5;
}

/* NAV */
.nav {
    position: fixed;
    width: 100%;
    padding: 20px 8%;
    display: flex;
    justify-content: space-between;
    background: rgba(13,13,13,0.7);
    backdrop-filter: blur(10px);
}

.logo {
    letter-spacing: 3px;
    font-weight: 600;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1491553895911-0055eca6402d') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    font-size: 80px;
    letter-spacing: 10px;
}

/* SECTION */
.section {
    padding: 120px 8%;
}

.title {
    font-size: 40px;
    margin-bottom: 20px;
}

.desc {
    color: #aaa;
    max-width: 500px;
}

/* GRID */
.grid {
    margin-top: 50px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 15px;
}

.grid img {
    width: 100%;
    height: 350px;
    object-fit: cover;
    filter: grayscale(100%);
    transition: 0.4s;
}

.grid img:hover {
    filter: grayscale(0%);
    transform: scale(1.03);
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 60px;
    border-top: 1px solid #222;
}
</style>
</head>

<body>

<div class="nav">
    <div class="logo">HAYWAY</div>
</div>

<section class="hero">
    <h1>HAYWAY</h1>
</section>

<section class="section">
    <div class="title">NEW GENERATION</div>
    <p class="desc">
        A brand built from silence, ambition, and the journey of becoming something greater.
    </p>

    <div class="grid">
        <img src="https://source.unsplash.com/400x500/?streetwear">
        <img src="https://source.unsplash.com/401x500/?fashion">
        <img src="https://source.unsplash.com/402x500/?urban">
        <img src="https://source.unsplash.com/403x500/?model">
        <img src="https://source.unsplash.com/404x500/?outfit">
        <img src="https://source.unsplash.com/405x500/?pants">
        <img src="https://source.unsplash.com/406x500/?black">
        <img src="https://source.unsplash.com/407x500/?minimal">
        <img src="https://source.unsplash.com/408x500/?street">
        <img src="https://source.unsplash.com/409x500/?clothing">
    </div>
</section>

<div class="footer">
    <p>© HAYWAY</p>
</div>

</body>
</html>
